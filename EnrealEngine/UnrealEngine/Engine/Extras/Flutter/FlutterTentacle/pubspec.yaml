name: flutter_tentacle
description: "Adds support for Tentacle devices"
publish_to: 'none'
version: 0.0.1

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: "^3.16.3"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter
    
  epic_common:
    path: ../FlutterCommon
    
  streaming_shared_preferences:
    path: ../../ThirdPartyNotUE/streaming_shared_preferences
      
  device_info_plus: ^11.1.0
  ffi: ^2.1.0
  intl: any
  logging: ^1.2.0
  permission_handler: ^11.1.0
  plugin_platform_interface: ^2.0.2
  provider: ^6.0.2
  system_clock: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  pigeon: ^22.6.3
  ffigen: ^16.0.0

flutter:
  generate: true
  
  assets:
    - assets/icons/
    - assets/icons/tentacle/
  
  plugin:
    platforms:
      android:
        package: com.epicgames.flutter_tentacle
        pluginClass: FlutterTentaclePlugin
      ios:
        pluginClass: FlutterTentaclePlugin